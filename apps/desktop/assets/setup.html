<!doctype html>
<!-- 첫 실행/서버 변경 설정 화면 — window.everdictSetup(setup 창 전용 브리지)으로만 통신. 설계 D8. -->
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Everdict — 서버 연결</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #08090a; color: #e6e6e6;
        display: grid; place-items: center; min-height: 100vh; padding: 24px;
      }
      main { width: 100%; max-width: 380px; }
      .dot { width: 40px; height: 40px; border-radius: 50%; background: #5e6ad2; margin: 0 auto 16px; }
      h1 { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 6px; }
      p { font-size: 12.5px; line-height: 1.6; color: #9a9ba1; text-align: center; margin-bottom: 20px; }
      label { display: block; font-size: 12px; color: #9a9ba1; margin-bottom: 6px; }
      input {
        width: 100%; padding: 9px 11px; font-size: 13px; color: #e6e6e6;
        background: #141517; border: 1px solid #2a2b2e; border-radius: 8px; outline: none;
      }
      input:focus { border-color: #5e6ad2; }
      button {
        width: 100%; margin-top: 12px; padding: 9px 0; font-size: 13px; font-weight: 550;
        color: #fff; background: #5e6ad2; border: 0; border-radius: 8px; cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .error { margin-top: 10px; font-size: 12px; color: #eb5757; min-height: 16px; text-align: center; }
      .hint { margin-top: 14px; font-size: 11.5px; color: #6b6c72; text-align: center; }
    </style>
  </head>
  <body>
    <main>
      <div class="dot"></div>
      <h1>Everdict 서버에 연결</h1>
      <p>팀이 쓰는 Everdict 웹 주소를 입력하세요.<br />로그인과 모든 기능은 이 서버를 통해 동작합니다.</p>
      <label for="url">서버 주소</label>
      <input id="url" type="url" placeholder="https://everdict.your-team.com" autofocus spellcheck="false" />
      <button id="save" type="button">연결</button>
      <div id="error" class="error"></div>
      <p class="hint">나중에 트레이 메뉴의 &lsquo;서버 주소 변경&rsquo;에서 바꿀 수 있습니다.</p>
    </main>
    <script>
      const input = document.getElementById('url')
      const button = document.getElementById('save')
      const error = document.getElementById('error')
      window.everdictSetup?.getServerUrl().then((current) => {
        if (current && !input.value) input.value = current
      }).catch(() => {})
      async function save() {
        error.textContent = ''
        button.disabled = true
        try {
          await window.everdictSetup.setServerUrl(input.value)
          // 성공 시 메인 프로세스가 이 창을 닫고 앱 창을 연다.
        } catch (e) {
          const msg = String(e && e.message ? e.message : e)
          error.textContent = msg.replace(/^Error invoking remote method '[^']+': Error: /, '')
          button.disabled = false
        }
      }
      button.addEventListener('click', save)
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') void save() })
    </script>
  </body>
</html>
