# Packaging — bundle only (no node_modules; see esbuild.mjs). Build/release runs on the CI 3-OS matrix
# (.github/workflows/desktop-release.yml, tag desktop-v* → GitHub Releases). Currently unsigned —
# add signing once certificates are obtained (mac: CSC_LINK/CSC_KEY_PASSWORD + notarize, win: sign config).
appId: dev.everdict.desktop
productName: Everdict
# A deterministic filename that is safe in a download link — no spaces, os/arch spelled out.
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  output: release
  buildResources: build
files:
  - bundle/**
  - assets/**
  - package.json
extraMetadata:
  main: bundle/main.js
asar: true
npmRebuild: false
linux:
  target:
    - AppImage
    - deb
  executableName: everdict-desktop
  category: Development
  icon: build/icon.png
  synopsis: Everdict desktop — web parity shell + resident self-hosted runner
mac:
  category: public.app-category.developer-tools
  # The macos-latest runner is arm64 — produce both arches for Intel Mac distribution (cross-arch build is possible).
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
# A win NSIS cross-build needs wine (rcedit) — CI builds natively on a windows runner.
win:
  target:
    - nsis
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
