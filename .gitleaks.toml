# gitleaks config — default ruleset + false-positive allowlist.
# Prevent i18n catalog key references (e.g. labelKey: 'presetDaily3am') from tripping the generic-api-key rule as false positives.
[extend]
useDefault = true

[allowlist]
description = "false positives"
regexTarget = "line"
paths = [
  # Comments describing the secret-store ownership model (owner="" vs owner=subject), not secrets.
  '''packages/db/src/secret-store\.ts''',
]
regexes = [
  # next-intl message key references — labelKey/descKey/hintKey: '<camelCaseKey>'
  '''(label|desc|hint|title)Key:\s*'[a-zA-Z][a-zA-Z0-9]*'"?''',
  # Documentation of the secret ownership sentinel in comments (owner=subject / owner="").
  '''owner\s*=\s*("")|owner=subject''',
  # Architecture docs listing application-control responsibilities — "credential primitives, scheduling/ops
  # orchestration" trips generic-api-key ("credential" keyword + a path-like token). Doc prose, not a secret.
  '''credential primitives, scheduling/ops orchestration''',
]
