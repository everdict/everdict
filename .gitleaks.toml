# gitleaks 설정 — 기본 룰셋 + 오탐 허용목록.
# i18n 카탈로그 키 참조(labelKey: 'presetDaily3am' 등)가 generic-api-key 룰에 걸리는 오탐 방지.
[extend]
useDefault = true

[allowlist]
description = "false positives"
regexTarget = "line"
regexes = [
  # next-intl 메시지 키 참조 — labelKey/descKey/hintKey: '<camelCaseKey>'
  '''(label|desc|hint|title)Key:\s*'[a-zA-Z][a-zA-Z0-9]*'"?''',
]
