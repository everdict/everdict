# 공개 CI — 5대 품질 게이트(lint/typecheck/test/build) + 빈-env 부팅 계약 + 웹(자체 완결) + 시크릿 스캔.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: lint · typecheck · test · build · boot
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # 버전은 package.json "packageManager" 에서 해석
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # 셀프호스트 최소 프로필 계약 — 컨트롤플레인이 옵션 env 전무 상태로 부팅되어야 한다.
      - run: node scripts/live/empty-env-boot.mjs

  web:
    name: web (self-contained lint · build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @assay/web lint
      - run: pnpm -F @assay/web build

  gitleaks:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리 스캔
      - name: Run gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks git . --log-opts="--all" --no-banner
