# Public CI — 5 quality gates (lint/typecheck/test/build) + empty-env boot contract + web (self-contained) + secret scan.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: lint · typecheck · test · build · boot
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6 # version resolved from package.json "packageManager"
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Slim agent image guard — the @everdict/agent dependency cone must stay control-plane-free.
      - run: pnpm cone
      # Web runtime-decoupling guard — apps/web may import only TYPE-ONLY @everdict/contracts.
      - run: pnpm web-imports
      # Self-host minimal-profile contract — the control plane must boot with zero optional env.
      - run: node scripts/live/empty-env-boot.mjs

  web:
    name: web (self-contained lint · build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @everdict/web lint
      - run: pnpm -F @everdict/web build

  gitleaks:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history scan
      - name: Run gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks git . --config .gitleaks.toml --log-opts="--all" --no-banner
