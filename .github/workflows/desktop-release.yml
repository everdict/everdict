# Desktop app 3-OS release — on tag `desktop-vX.Y.Z` push (or manual dispatch=draft),
# build installers with electron-builder on ubuntu/macos/windows runners and publish them as a single GitHub Release.
# Artifacts: linux AppImage+deb · mac dmg+zip(x64/arm64) · win nsis. All unsigned (add signing once a certificate is obtained).
# Design: docs/architecture/desktop-app.md (slice 5 CI).
name: desktop-release

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0) — used in filenames/release name, published as draft"
        required: true

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux
          - os: macos-latest
            args: --mac
          - os: windows-latest
            args: --win
    runs-on: ${{ matrix.os }}
    env:
      # No signing certificate — disable automatic signing discovery (so macOS keychain lookup in particular doesn't break the build).
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6 # version from the root package.json packageManager field
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Inject version (tag desktop-vX.Y.Z → X.Y.Z, dispatch uses the input)
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#desktop-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          (cd apps/desktop && npm pkg set version="${VERSION}")

      - name: Build dependencies (turbo — desktop dependency chain only)
        run: pnpm turbo run build --filter=@everdict/desktop

      - name: Package (esbuild single bundle → electron-builder, unsigned)
        working-directory: apps/desktop
        env:
          # Default server URL baked into the release build (D8) — set in repo Variables (if unset, the app shows a first-run setup screen).
          EVERDICT_DESKTOP_DEFAULT_WEB_URL: ${{ vars.EVERDICT_DESKTOP_DEFAULT_WEB_URL }}
        run: |
          node esbuild.mjs
          pnpm exec electron-builder ${{ matrix.args }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          if-no-files-found: error
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest*.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release (tag trigger = final, dispatch = draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('desktop-v{0}', inputs.version) }}
          name: Everdict Desktop ${{ github.ref_type == 'tag' && github.ref_name || format('desktop-v{0}', inputs.version) }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          files: dist/**
