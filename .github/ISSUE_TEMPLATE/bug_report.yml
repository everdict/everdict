name: Bug report
description: Something doesn't work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For security vulnerabilities, **do not** open a public issue — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps/commands. If it involves a run, include the harness kind (process/command/service) and runtime (local/nomad/k8s/self-hosted).
      render: shell
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, how you run the control plane (compose dev/prod, native), store (in-memory/Postgres).
      placeholder: |
        OS: Ubuntu 24.04
        Node: 22.x
        Control plane: docker-compose.dev.yaml
        Store: in-memory
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
