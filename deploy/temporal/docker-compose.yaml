# Self-hosted Temporal dev server (start-dev: embedded DB + UI). For development/experimentation.
#   docker compose -f deploy/temporal/docker-compose.yaml up -d
#   gRPC: localhost:7233   UI: http://localhost:8233
# For production use a persistent deployment (auto-setup + Postgres/Cassandra) — not start-dev.
services:
  temporal:
    image: temporalio/temporal:latest
    command: ["server", "start-dev", "--ip", "0.0.0.0", "--ui-ip", "0.0.0.0"]
    ports:
      - "7233:7233"
      - "8233:8233"
    restart: unless-stopped
