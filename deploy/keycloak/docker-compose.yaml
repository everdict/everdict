# Local Keycloak (human = tenant user auth, OIDC) — apps/api verifies the JWT (the auth core is owned by the control plane).
# Start: docker compose -f deploy/keycloak/docker-compose.yaml up -d   (admin console: http://localhost:8080, admin/admin)
#
# Auto-imports realm-everdict.json via --import-realm:
#  - realm `everdict`, realm roles viewer/member/admin
#  - client `everdict-web` (confidential, secret=everdict-web-secret, standard flow + direct grant, redirect 3001)
#  - protocol mapper: user attribute `workspace` → token claim `workspace` (apps/api identifies the workspace from this claim)
#  - demo users: alice/alice (member, workspace=acme), carol/carol (admin, workspace=acme)
#
# apps/api side: KEYCLOAK_ISSUER=http://localhost:8080/realms/everdict EVERDICT_REQUIRE_AUTH=1 node apps/api/dist/main.js
# apps/web side .env: KEYCLOAK_ISSUER=…/realms/everdict, KEYCLOAK_CLIENT_ID=everdict-web, KEYCLOAK_CLIENT_SECRET=everdict-web-secret
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      # The canonical host for external access. Browser redirects and the token issuer are unified to this URL.
      # localhost breaks external access, so for external access KC_HOSTNAME must be set to the external host
      # (scripts/dev/up.sh sets it automatically from EVERDICT_PUBLIC_HOST). The default is local-only.
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:${KEYCLOAK_PORT:-8080}}
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./realm-everdict.json:/opt/keycloak/data/import/realm-everdict.json:ro
      # Persistence: realm/users/sessions survive restarts. --import-realm imports only when the realm is absent
      # (first startup), so subsequent admin-console changes are preserved. To re-import from scratch, delete this volume:
      #   docker compose -f deploy/keycloak/docker-compose.yaml down -v
      - keycloak-data:/opt/keycloak/data

volumes:
  keycloak-data:
