# 로컬 Keycloak (사람=테넌트 유저 인증, OIDC) — apps/api 가 JWT 를 검증(인증 코어는 컨트롤플레인 소유).
# 기동: docker compose -f deploy/keycloak/docker-compose.yaml up -d   (admin 콘솔: http://localhost:8080, admin/admin)
#
# realm-assay.json 을 --import-realm 로 자동 임포트한다:
#  - realm `assay`, realm roles viewer/member/admin
#  - client `assay-web` (confidential, secret=assay-web-secret, standard flow + direct grant, redirect 3001)
#  - protocol mapper: user attribute `workspace` → token claim `workspace` (apps/api 가 이 클레임으로 워크스페이스 식별)
#  - demo users: alice/alice (member, workspace=acme), carol/carol (admin, workspace=acme)
#
# apps/api 측: KEYCLOAK_ISSUER=http://localhost:8080/realms/assay ASSAY_REQUIRE_AUTH=1 node apps/api/dist/main.js
# apps/web 측 .env: KEYCLOAK_ISSUER=…/realms/assay, KEYCLOAK_CLIENT_ID=assay-web, KEYCLOAK_CLIENT_SECRET=assay-web-secret
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./realm-assay.json:/opt/keycloak/data/import/realm-assay.json:ro
      # 영속화: realm/유저/세션이 재시작해도 유지된다. --import-realm 은 realm 이 없을 때(첫 기동)만
      # 임포트하므로, 이후 admin 콘솔 변경분은 보존된다. 처음부터 다시 임포트하려면 이 볼륨을 삭제:
      #   docker compose -f deploy/keycloak/docker-compose.yaml down -v
      - keycloak-data:/opt/keycloak/data

volumes:
  keycloak-data:
