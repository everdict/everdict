# Local Postgres (the control-plane persistent store) — apps/api connects via DATABASE_URL and applies migrations automatically.
# Without this (= DATABASE_URL unset) the API runs in-memory and workspaces/datasets are lost on restart.
#
# Start: docker compose -f deploy/postgres/docker-compose.yaml up -d --wait   (waits until the healthcheck passes)
#   (scripts/dev/up.sh brings it up automatically alongside Keycloak)
#
# apps/api side: DATABASE_URL=postgresql://everdict:everdict@localhost:${POSTGRES_PORT:-5433}/everdict
#
# The default host port is 5433 (avoids the common 5432 being taken — the same convention as Keycloak 8080→8081).
# If 5433 is also taken, change POSTGRES_PORT and match the port in DATABASE_URL.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-everdict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-everdict}
      POSTGRES_DB: ${POSTGRES_DB:-everdict}
    ports:
      # Published on the host because the native API (node --env-file) connects via localhost.
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-everdict} -d ${POSTGRES_DB:-everdict}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      # Persistence: workspaces/datasets/scorecards survive restarts.
      # For a full reset: docker compose -f deploy/postgres/docker-compose.yaml down -v
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
