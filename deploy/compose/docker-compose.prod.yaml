# Everdict full-stack production compose — web + API + Postgres (no Keycloak).
#
#   cp deploy/compose/.env.example deploy/compose/.env   # fill in the values (at minimum POSTGRES_PASSWORD)
#   docker compose -f deploy/compose/docker-compose.prod.yaml --env-file deploy/compose/.env up -d --build
#
# Differences from dev (hardening):
#  - Postgres stores (persistent volume, migrations applied automatically at startup).
#  - Secret at-rest encryption (EVERDICT_SECRETS_KEY) + an internal token (EVERDICT_INTERNAL_TOKEN) + per-tenant run budgets (optional).
#  - restart: unless-stopped + health checks + depends_on(healthy).
#  - No source bind mounts — runs only from the runtime image's build artifacts.
#
# ⚠️ Auth: Keycloak (OIDC human login) is removed. The web has no static API-key path and operates as x-everdict-tenant=default,
#    so the API must accept the dev fallback too → EVERDICT_REQUIRE_AUTH is left unset (not enforced, single tenant default).
#    That is, this stack assumes a trusted network / behind a reverse proxy (do not expose it publicly).
#    If you need real auth:
#      · Programmatic/MCP access → EVERDICT_REQUIRE_AUTH=1 + mint API keys via /internal/tenant-keys (the web UI won't work then)
#      · Human SSO               → a reverse proxy such as oauth2-proxy in front, or add Keycloak back
name: everdict-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-everdict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-everdict}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-everdict} -d ${POSTGRES_DB:-everdict}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: runtime
    environment:
      PORT: "8787"
      DATABASE_URL: postgresql://${POSTGRES_USER:-everdict}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-everdict}
      # Secret at-rest encryption KEK (base64, 32B). Leave empty to disable the secret store (fail-closed).
      EVERDICT_SECRETS_KEY: ${EVERDICT_SECRETS_KEY:-}
      # Guard token for /internal/** (minting API keys). Leave empty to disable those routes (fail-closed).
      EVERDICT_INTERNAL_TOKEN: ${EVERDICT_INTERNAL_TOKEN:-}
      # Per-tenant concurrent-run ceiling (optional). Leave empty for unlimited.
      EVERDICT_TENANT_RUNS: ${EVERDICT_TENANT_RUNS:-}
      # Needed only when the local backend runs the claude-code harness in-process (can be replaced by tenant secrets).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8787}:8787"
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: runtime
    environment:
      # The web (server) → API call uses the compose network's service name. KEYCLOAK_* unset → operates as tenant=default.
      CONTROL_PLANE_URL: http://api:8787
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3001}:3001"
    restart: unless-stopped

volumes:
  pgdata:
