# Everdict full-stack dev compose — web + API at once, with hot reload.
#
#   docker compose -f deploy/compose/docker-compose.dev.yaml up --build
#     web : http://localhost:3001   (operates as tenant=default without auth)
#     API : http://localhost:8787   (dev fallback: x-everdict-tenant header)
#
# Characteristics (dev defaults):
#  - Auth OFF: without Keycloak, the web runs in dev mode and the API uses the dev fallback → clickable right away.
#  - In-memory stores (EVERDICT_REQUIRE_AUTH unset, DATABASE_URL unset) → reset on restart.
#  - Backend local (in-process on this machine). Actually running the claude-code harness needs a token in .env (scripted does not).
#  - Source bind-mounted into the containers (Linux host → node_modules compatible). web=next dev, API=tsc -w + node --watch.
#
# Note: for native hot reload (Keycloak+API+web without containers), there is also `bash scripts/dev/up.sh`.
name: everdict-dev

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: dev
    working_dir: /app
    command:
      - sh
      - -lc
      - pnpm install --frozen-lockfile && pnpm --filter @everdict/api... build && (node_modules/.bin/tsc -p apps/api/tsconfig.json --watch --preserveWatchOutput & exec node --watch apps/api/dist/main.js)
    environment:
      PORT: "8787"
      EVERDICT_TIMEOUT_SEC: "300"
      # Needed only when the local backend runs the claude-code harness in-process (the scripted harness does not).
      # Passed through if present in the host shell/.env, otherwise empty.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    volumes:
      - ../..:/app
    ports:
      - "8787:8787"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: dev
    working_dir: /app
    command:
      - sh
      - -lc
      - pnpm install --frozen-lockfile && pnpm --filter @everdict/web dev
    environment:
      # The web (server) → API call uses the compose network's service name.
      CONTROL_PLANE_URL: http://api:8787
      # KEYCLOAK_* unset → the web runs in dev mode (no auth, x-everdict-tenant=default), and the API accepts the dev fallback.
    volumes:
      - ../..:/app
    ports:
      - "3001:3001"
    depends_on:
      - api
