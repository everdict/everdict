# pre-commit = format+lint + gitleaks backstop.
# Heavy tests run in CI, not pre-commit (early in the monorepo, keep them in CI until the turbo cache stabilizes).
repos:
  - repo: local
    hooks:
      - id: biome-check
        name: biome check (format + lint)
        entry: pnpm biome check --write --no-errors-on-unmatched
        language: system
        types: [ts]
        require_serial: true
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
